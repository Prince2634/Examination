<!DOCTYPE html>
<html lang="en">

  <body>

    <script>
    AFRAME.registerComponent('pool-scene', {
      schema: {
        width:      { type: 'number', default: 24 },
        depth:      { type: 'number', default: 16 },
        waterlevel: { type: 'number', default: 0  }
      },

      init: function () {
        this._waterMesh = null;
        this._clock     = 0;
        this._root      = null;
        this.el.sceneEl.addEventListener('loaded', () => { this._build(); });
      },

      _build: function () {
        if (this._root) {
          this.el.removeChild(this._root);
          if (this._waterMesh) {
            this._waterMesh.parent && this._waterMesh.parent.remove(this._waterMesh);
            this._waterMesh.geometry.dispose();
            this._waterMesh.material.dispose();
            this._waterMesh = null;
          }
        }
        const root = document.createElement('a-entity');
        this._root = root;
        this.el.appendChild(root);
        this._buildWater(this.data.width, this.data.depth, this.data.waterlevel);
      },

      _buildWater: function (PW, PD, wl) {
        if (this._waterMesh) {
          this._waterMesh.parent && this._waterMesh.parent.remove(this._waterMesh);
          this._waterMesh.geometry.dispose();
          this._waterMesh.material.dispose();
          this._waterMesh = null;
        }

        const geo = new THREE.PlaneGeometry(PW - 0.4, PD - 0.4, 80, 80);
        geo.rotateX(-Math.PI / 2);

        const mat = new THREE.ShaderMaterial({
          uniforms: {
            uTime:    { value: 0.0 },
            uDeep:    { value: new THREE.Color(0x096a92) },
            uShallow: { value: new THREE.Color(0x48c8f0) }
          },
          vertexShader: `
            uniform float uTime;
            varying float vWave;
            varying vec2  vUv;
            float w(vec2 p, float sp, float fr, float am) {
              return sin(p.x * fr + uTime * sp) * cos(p.y * fr * 0.8 + uTime * sp * 0.72) * am;
            }
            void main() {
              vUv = uv;
              vec3 pos = position;
              float wd = w(pos.xz, 1.80, 0.55, 0.11)
                       + w(pos.xz, 2.40, 1.10, 0.06)
                       + w(pos.xz, 1.10, 0.28, 0.14)
                       + w(pos.xz * 0.7 + 1.3, 3.0, 1.8, 0.03);
              pos.y += wd;
              vWave = wd;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
          `,
          fragmentShader: `
            uniform float uTime;
            uniform vec3  uDeep;
            uniform vec3  uShallow;
            varying float vWave;
            varying vec2  vUv;
            void main() {
              float t       = clamp((vWave + 0.28) / 0.56, 0.0, 1.0);
              vec3  col     = mix(uDeep, uShallow, t);
              float caustic = abs(sin(vUv.x * 20.0 + uTime * 1.6)
                                * sin(vUv.y * 16.0 + uTime * 1.3));
              col += vec3(pow(caustic, 3.0) * 0.18);
              gl_FragColor  = vec4(col, 0.84);
            }
          `,
          transparent: true,
          side: THREE.DoubleSide,
          depthWrite: false
        });

        this._waterMesh = new THREE.Mesh(geo, mat);
        this._waterMesh.position.set(0, wl, 0);
        this._waterMesh.receiveShadow = true;

        if (this._root && this._root.object3D) {
          this._root.object3D.add(this._waterMesh);
        } else {
          this.el.sceneEl.object3D.add(this._waterMesh);
        }
      },

      tick: function (time, delta) {
        this._clock += delta * 0.001;
        if (this._waterMesh) {
          this._waterMesh.material.uniforms.uTime.value = this._clock;
        }
      },

      remove: function () {
        if (this._waterMesh) {
          this._waterMesh.parent && this._waterMesh.parent.remove(this._waterMesh);
          this._waterMesh.geometry.dispose();
          this._waterMesh.material.dispose();
        }
      }
    });
    </script>
