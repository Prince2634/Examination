<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FCM.41.008.227.23</title>
    <script src="script/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene
      shadow="type: pcfsoft"
      renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
      fog="type: linear; color: #c9ddf0; near: 60; far: 200"
    >

      <!-- Assets -->
      <a-assets timeout="120000">
        <a-asset-item id="villaModel" src="model/scene.gltf"></a-asset-item>
        <!-- User-provided pool texture asset -->
        <img id="swimming_pool_with_texture" src="textures/swimming_pool_with_texture.jpg" crossorigin="anonymous" />
      </a-assets>

      <!-- Villa Model -->
      <a-entity
        id="villa"
        gltf-model="#villaModel"
        position="0 0 0"
        shadow="cast: true; receive: true"
      ></a-entity>

      <!-- ========== LIGHTING ========== -->

      <!-- Sun (warm directional) -->
      <a-entity
        light="type: directional; intensity: 1.4; color: #fff5e0; castShadow: true"
        position="30 25 20"
      ></a-entity>

      <!-- Fill light (cool sky bounce) -->
      <a-entity
        light="type: directional; intensity: 0.35; color: #a0c8e8"
        position="-20 15 -15"
      ></a-entity>

      <!-- Hemisphere light (sky/ground color bleed) -->
      <a-entity
        light="type: hemisphere; intensity: 0.5; color: #87CEEB; groundColor: #3a7a3a"
      ></a-entity>

      <!-- Ambient -->
      <a-entity light="type: ambient; intensity: 0.45; color: #e8f0f8"></a-entity>

      <!-- ========== SKY ========== -->

      <a-sky
        material="shader: flat; color: #87CEEB"
        theta-length="180"
      ></a-sky>

      <!-- ========== SUN ========== -->

      <a-sphere
        id="sun"
        position="80 60 -100"
        radius="15"
        material="shader: flat; color: #fff8dc; emissive: #fff8dc; emissiveIntensity: 1; side: back"
      ></a-sphere>

      <!-- Sun glow -->
      <a-sphere
        position="80 60 -100"
        radius="25"
        material="shader: flat; color: #fffde0; opacity: 0.15; transparent: true; side: back"
      ></a-sphere>

      <!-- ========== CLOUDS ========== -->

      <!-- Cloud 1 (fluffy) -->
      <a-entity position="-30 45 -80" animation="property: position; from: -30 45 -80; to: -25 45 -80; dur: 20000; dir: alternate; loop: true; easing: easeInOutSine">
        <a-sphere position="0 0 0" radius="4" material="color: #ffffff; opacity: 0.65; transparent: true"></a-sphere>
        <a-sphere position="4 0.5 0" radius="3.5" material="color: #ffffff; opacity: 0.7; transparent: true"></a-sphere>
        <a-sphere position="-4 0.5 0" radius="3.5" material="color: #ffffff; opacity: 0.7; transparent: true"></a-sphere>
        <a-sphere position="2 -1 0" radius="3" material="color: #ffffff; opacity: 0.65; transparent: true"></a-sphere>
        <a-sphere position="-2 -1 0" radius="3" material="color: #ffffff; opacity: 0.65; transparent: true"></a-sphere>
      </a-entity>

      <!-- Cloud 2 (fluffy) -->
      <a-entity position="20 50 -90" animation="property: position; from: 20 50 -90; to: 25 50 -90; dur: 25000; dir: alternate; loop: true; easing: easeInOutSine">
        <a-sphere position="0 0 0" radius="5.5" material="color: #ffffff; opacity: 0.6; transparent: true"></a-sphere>
        <a-sphere position="6 1 0" radius="4.5" material="color: #ffffff; opacity: 0.65; transparent: true"></a-sphere>
        <a-sphere position="-6 1 0" radius="4.5" material="color: #ffffff; opacity: 0.65; transparent: true"></a-sphere>
        <a-sphere position="3 -1.5 0" radius="4" material="color: #ffffff; opacity: 0.6; transparent: true"></a-sphere>
        <a-sphere position="-3 -1.5 0" radius="4" material="color: #ffffff; opacity: 0.6; transparent: true"></a-sphere>
      </a-entity>

      <!-- Cloud 3 (fluffy) -->
      <a-entity position="60 42 -70" animation="property: position; from: 60 42 -70; to: 65 42 -70; dur: 18000; dir: alternate; loop: true; easing: easeInOutSine">
        <a-sphere position="0 0 0" radius="4.5" material="color: #ffffff; opacity: 0.62; transparent: true"></a-sphere>
        <a-sphere position="5 0.5 0" radius="4" material="color: #ffffff; opacity: 0.68; transparent: true"></a-sphere>
        <a-sphere position="-5 0.5 0" radius="4" material="color: #ffffff; opacity: 0.68; transparent: true"></a-sphere>
        <a-sphere position="2.5 -1 0" radius="3.5" material="color: #ffffff; opacity: 0.62; transparent: true"></a-sphere>
        <a-sphere position="-2.5 -1 0" radius="3.5" material="color: #ffffff; opacity: 0.62; transparent: true"></a-sphere>
      </a-entity>

      <!-- Cloud 4 (fluffy) -->
      <a-entity position="-50 55 -60" animation="property: position; from: -50 55 -60; to: -45 55 -60; dur: 22000; dir: alternate; loop: true; easing: easeInOutSine">
        <a-sphere position="0 0 0" radius="5" material="color: #ffffff; opacity: 0.58; transparent: true"></a-sphere>
        <a-sphere position="5.5 1 0" radius="4" material="color: #ffffff; opacity: 0.63; transparent: true"></a-sphere>
        <a-sphere position="-5.5 1 0" radius="4" material="color: #ffffff; opacity: 0.63; transparent: true"></a-sphere>
        <a-sphere position="3 -1.5 0" radius="3.5" material="color: #ffffff; opacity: 0.58; transparent: true"></a-sphere>
        <a-sphere position="-3 -1.5 0" radius="3.5" material="color: #ffffff; opacity: 0.58; transparent: true"></a-sphere>
      </a-entity>

      <!-- Cloud 5 (fluffy) -->
      <a-entity position="0 48 -110" animation="property: position; from: 0 48 -110; to: 5 48 -110; dur: 30000; dir: alternate; loop: true; easing: easeInOutSine">
        <a-sphere position="0 0 0" radius="5.5" material="color: #ffffff; opacity: 0.6; transparent: true"></a-sphere>
        <a-sphere position="6 1 0" radius="4.5" material="color: #ffffff; opacity: 0.65; transparent: true"></a-sphere>
        <a-sphere position="-6 1 0" radius="4.5" material="color: #ffffff; opacity: 0.65; transparent: true"></a-sphere>
        <a-sphere position="3.5 -1.5 0" radius="4" material="color: #ffffff; opacity: 0.6; transparent: true"></a-sphere>
        <a-sphere position="-3.5 -1.5 0" radius="4" material="color: #ffffff; opacity: 0.6; transparent: true"></a-sphere>
      </a-entity>

      <!-- Cloud 6 (near sun, warm tint, fluffy) -->
      <a-entity position="70 55 -90" animation="property: position; from: 70 55 -90; to: 75 55 -90; dur: 15000; dir: alternate; loop: true; easing: easeInOutSine">
        <a-sphere position="0 0 0" radius="4" material="color: #fff5e0; opacity: 0.5; transparent: true"></a-sphere>
        <a-sphere position="4 0.5 0" radius="3.5" material="color: #fff5e0; opacity: 0.55; transparent: true"></a-sphere>
        <a-sphere position="-4 0.5 0" radius="3.5" material="color: #fff5e0; opacity: 0.55; transparent: true"></a-sphere>
        <a-sphere position="2 -1 0" radius="3" material="color: #fff5e0; opacity: 0.5; transparent: true"></a-sphere>
        <a-sphere position="-2 -1 0" radius="3" material="color: #fff5e0; opacity: 0.5; transparent: true"></a-sphere>
      </a-entity>

      <!-- ========== GROUND / LANDSCAPE ========== -->

      <!-- Main grass field (large, covers the whole area) -->
      <a-plane
        position="12 -0.02 0"
        rotation="-90 0 0"
        width="200"
        height="200"
        material="color: #4a8c3f; roughness: 0.9; metalness: 0; side: double"
        shadow="receive: true"
      ></a-plane>

      <!-- Grass variation layer (darker patches for realism) -->
      <a-plane
        position="-10 -0.015 -15"
        rotation="-90 0 0"
        width="50"
        height="50"
        material="color: #3d7a33; roughness: 0.95; metalness: 0; opacity: 0.5; transparent: true; side: double"
        shadow="receive: true"
      ></a-plane>

      <a-plane
        position="40 -0.015 -20"
        rotation="-90 0 0"
        width="40"
        height="40"
        material="color: #3d7a33; roughness: 0.95; metalness: 0; opacity: 0.4; transparent: true; side: double"
        shadow="receive: true"
      ></a-plane>

      <!-- Driveway / path (in front of entrance) -->
      <a-plane
        position="12 -0.01 -18"
        rotation="-90 0 0"
        width="8"
        height="30"
        material="color: #8a8070; roughness: 0.85; metalness: 0.05; side: double"
        shadow="receive: true"
      ></a-plane>

     

     
      

      <!-- Garden path (stone walkway to entrance) -->
      <a-plane
        position="5 -0.01 -8"
        rotation="-90 30 0"
        width="3"
        height="12"
        material="color: #a09888; roughness: 0.9; metalness: 0; side: double"
        shadow="receive: true"
      ></a-plane>

      <!-- Flower bed (left of entrance) -->
      <a-plane
        position="-2 -0.01 -8"
        rotation="-90 0 0"
        width="6"
        height="4"
        material="color: #5c3d2e; roughness: 1; metalness: 0; side: double"
        shadow="receive: true"
      ></a-plane>

      <!-- Flower bed (right of entrance) -->
      <a-plane
        position="26 -0.01 -8"
        rotation="-90 0 0"
        width="6"
        height="4"
        material="color: #5c3d2e; roughness: 1; metalness: 0; side: double"
        shadow="receive: true"
      ></a-plane>

      <!-- Gate post left -->
      <a-box
        position="0 1.2 -25"
        width="1.2"
        height="2.4"
        depth="1.2"
        material="color: #8a8070; roughness: 0.7"
        shadow="cast: true; receive: true"
      ></a-box>

      <!-- Gate post right -->
      <a-box
        position="24 1.2 -25"
        width="1.2"
        height="2.4"
        depth="1.2"
        material="color: #8a8070; roughness: 0.7"
        shadow="cast: true; receive: true"
      ></a-box>

      <!-- Gate arch -->
      <a-box
        position="12 2.7 -25"
        width="25.2"
        height="0.5"
        depth="0.6"
        material="color: #8a8070; roughness: 0.7"
        shadow="cast: true; receive: true"
      ></a-box>

      <!-- Hedge left of gate -->
      <a-box
        position="-12 0.5 -25"
        width="18"
        height="1"
        depth="1.5"
        material="color: #2d5a27; roughness: 0.9"
        shadow="cast: true; receive: true"
      ></a-box>

      <!-- Hedge right of gate -->
      <a-box
        position="36 0.5 -25"
        width="18"
        height="1"
        depth="1.5"
        material="color: #2d5a27; roughness: 0.9"
        shadow="cast: true; receive: true"
      ></a-box>

      <!-- Hedge row (left boundary, away from building) -->
      <a-box
        position="-15 0.5 -10"
        width="1.5"
        height="1"
        depth="30"
        material="color: #2d5a27; roughness: 0.9"
        shadow="cast: true; receive: true"
      ></a-box>

      <!-- Hedge row (right boundary, away from building) -->
      <a-box
        position="39 0.5 -10"
        width="1.5"
        height="1"
        depth="30"
        material="color: #2d5a27; roughness: 0.9"
        shadow="cast: true; receive: true"
      ></a-box>

      <!-- ========== TREES ========== -->

      <!-- Tree 1 (left side, front) -->
      <a-cylinder
        position="-15 2 -12"
        radius="0.3"
        height="4"
        material="color: #6b4226; roughness: 0.9"
        shadow="cast: true"
      ></a-cylinder>
      <a-sphere
        position="-15 5 -12"
        radius="2.5"
        material="color: #2d7a27; roughness: 0.9"
        shadow="cast: true"
      ></a-sphere>

      <!-- Tree 2 (left side, front) -->
      <a-cylinder
        position="-20 2 -8"
        radius="0.35"
        height="4.5"
        material="color: #6b4226; roughness: 0.9"
        shadow="cast: true"
      ></a-cylinder>
      <a-sphere
        position="-20 5.5 -8"
        radius="3"
        material="color: #1f6b1f; roughness: 0.9"
        shadow="cast: true"
      ></a-sphere>

      <!-- Tree 3 (right side, front) -->
      <a-cylinder
        position="38 2 -10"
        radius="0.3"
        height="4"
        material="color: #6b4226; roughness: 0.9"
        shadow="cast: true"
      ></a-cylinder>
      <a-sphere
        position="38 5 -10"
        radius="2.5"
        material="color: #2d7a27; roughness: 0.9"
        shadow="cast: true"
      ></a-sphere>

      <!-- Tree 4 (back) -->
      <a-cylinder
        position="10 2 15"
        radius="0.4"
        height="5"
        material="color: #5a3a1a; roughness: 0.9"
        shadow="cast: true"
      ></a-cylinder>
      <a-sphere
        position="10 6 15"
        radius="3.5"
        material="color: #1f6b1f; roughness: 0.9"
        shadow="cast: true"
      ></a-sphere>

      <!-- Tree 5 (back right) -->
      <a-cylinder
        position="30 2 12"
        radius="0.35"
        height="4.5"
        material="color: #6b4226; roughness: 0.9"
        shadow="cast: true"
      ></a-cylinder>
      <a-sphere
        position="30 5.5 12"
        radius="3"
        material="color: #2d7a27; roughness: 0.9"
        shadow="cast: true"
      ></a-sphere>

      <!-- Tree 6 (front left) -->
      <a-cylinder
        position="-5 2 -14"
        radius="0.25"
        height="3.5"
        material="color: #6b4226; roughness: 0.9"
        shadow="cast: true"
      ></a-cylinder>
      <a-sphere
        position="-5 4.5 -14"
        radius="2"
        material="color: #358a30; roughness: 0.9"
        shadow="cast: true"
      ></a-sphere>

      <!-- ========== CAMERA ========== -->

      <a-entity
        id="rig"
        position="12 5 30"
        rotation="0 360 0"
      >
        <a-entity
          camera
          look-controls="reverseMouseDrag: true"
          wasd-controls="acceleration: 80; fly: true"
        ></a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
